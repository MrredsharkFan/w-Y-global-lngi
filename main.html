<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Termiunsfinity's Y LNGI</title>
    <link rel="stylesheet" href="style.css">
    </link>
</head>

<body>
    <div class="header">
        <h2>Termiunsfinity's &omega;-Y LNGI<small style="color: #999"> With contributions from <a
                    href="https://github.com/RNGDelak" target="_blank">RNGDelak</a></small></h2>

        <div class="status-row">
            <div id="online">🟢 0 user online (please reload page if the counter stuck at 0)</div>
            <div class="status-buttons">
                <button id="btn_lngi">Lngi & Analysis</button>
                <button id="btn_progress">Progress</button>
                <button id="btn_milestone">Milestone</button>
                <button id="settings_btn">Settings</button>
            </div>
        </div>
    </div>


    <div class="top-row" id="top/row">
        <div class="card" id="time">Time elapsed: Loading...</div>
        <div class="card" id="tps">Running at 0 tps</div>
    </div>

    <div class="bar-flexbox" id="bar/flexbox">
        <div class="bar-container">
            <div id="main_lngi_bar"></div>
        </div>
    </div>

    <div class="card resizable" id="main_lngi">
        <div id="main_lngi_Content">Loading main sequence...</div>
        <div class="resize-handle"></div>
    </div>

    <div class="mid-row" id="mid/row">
        <div class="card resizable" id="BMS_lngi">
            <div id="BMS_lngi_Content">Loading BMS...</div>
            <div class="resize-handle"></div>
        </div>
        <div class="card resizable" id="OCF_lngi">
            <div id="OCF_lngi_Content">Loading OCF...</div>
            <div class="resize-handle"></div>
        </div>
    </div>

    <div class="card milestone-header" id="milestone_header">

        <div class="header-row">
            <label for="Scratch_bar_height">
                Milestone bar height :
            </label>

            <input type="number" id="Scratch_bar_height" value="24" min="1" max="100">

            <span>px</span>

            <button id="time_mode" onclick="tt = (tt+1)%2">
                Time Remaining
            </button>
        </div>

        <div class="header-row">
            <label for="scratch_bar_display_mode">
                Notation on milestone bar :
            </label>

            <select id="scratch_bar_display_mode">
                <option value="wY">&omega;-Y sequence</option>
                <option value="BMS">BMS</option>
                <option value="OCN">OCN</option>
                <option value="cOCF">cOCF</option>
            </select>
        </div>

    </div>
    <div class="card resizable" id="scratch_bars" hidden>
        <div id="scratch_content"></div>
        <div class="resize-handle"></div>
    </div>

    <div id="future-milestone" hidden>

        <h3>Day</h3>
        <div>
            <button data-day="-100" class="extreme_step">-100</button>
            <button data-day="-10" class="high_step">-10</button>
            <button data-day="-1" class="normal_step">-1</button>

            <input type="date" id="mile_date">

            <button data-day="1" class="normal_step">+1</button>
            <button data-day="10" class="high_step">+10</button>
            <button data-day="100" class="extreme_step">+100</button>
        </div>

        <div id="day_result"></div>

        <hr>

        <h3>Month</h3>
        <div>
            <button data-month="-100" class="extreme_step">-100</button>
            <button data-month="-10" class="high_step">-10</button>
            <button data-month="-1" class="normal_step">-1</button>

            <input type="month" id="mile_month">

            <button data-month="1" class="normal_step">+1</button>
            <button data-month="10" class="high_step">+10</button>
            <button data-month="100" class="extreme_step">+100</button>
        </div>

        <div id="month_result"></div>

        <hr>

        <h3>Year</h3>
        <div>
            <button data-year="-100" class="extreme_step">-100</button>
            <button data-year="-10" class="high_step">-10</button>
            <button data-year="-1" class="normal_step">-1</button>

            <input type="number" id="mile_year" min="2025">

            <button data-year="1" class="normal_step">+1</button>
            <button data-year="10" class="high_step">+10</button>
            <button data-year="100" class="extreme_step">+100</button>
        </div>

        <div id="year_result"></div>

    </div>


    <div id="settings_modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Notation Settings</h3>
                <button id="close_settings">&times;</button>
            </div>

            <div class="modal-body">
                Notation on analysis section :
                <select id="Analysis_display_mode">
                    <option value="OCN">OCN</option>
                    <option value="cOCF">cOCF</option>
                </select>
            </div>

            <div class="modal-body checkbox-row">
                <input type="checkbox" id="compress_bms">
                <label for="compress_bms">
                    Compress BMS (aka (0,0,0)(1,1,1)(2,2,0) into ()(1,1,1)(2,2))
                </label>
            </div>

            <div class="modal-body checkbox-row">
                <input type="checkbox" id="format_cOCF" checked>
                <label for="format_cOCF">
                    Format cOCF (aka [][[][[[c][[c]c]]c]] into &omega;<sup>M+1</sup>+1)
                </label>
            </div>
        </div>
    </div>


</body>
<script>
    window._nativeSetInterval = window.setInterval;
    window._nativeClearInterval = window.clearInterval;
    window._nativeDateNow = Date.now;
</script>
<script src="proxy.js" type="module"></script>
<script src="ui.js"></script>
<script src="conv.js"></script>
<script src="lngi.js"></script>
<script src="milestone.js"></script>

</html>
