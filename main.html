<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Termiunsfinity's Y LNGI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 2px
        }

        .top-row {
            display: flex;
            gap: 15px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .card {
            padding: 12px;
            border-radius: 5px;
            overflow-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        #time {
            background-color: #ffff8d;
            flex: 3;
            min-width: 280px;
        }

        #tps {
            background-color: #dddddd;
            flex: 0.5;
            min-width: 120px;
            display: flex;
            align-items: center;
            text-align: right;
        }

        .bar-flexbox {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            gap: 15px
        }

        .bar-container {
            background-color: #eee;
            border-radius: 4px;
            overflow: hidden;
            flex: 3;
        }

        #main_lngi_bar {
            background-color: #bcd;
            transition: width 0.05s ease;
            text-wrap: nowrap;
            padding: 3px
        }

        #extra_box {
            background-color: #aaa;
            flex: 1;
            border-radius: 4px;
            text-wrap: nowrap;
            text-align: right;
            padding: 3px
        }

        /* Main LNGI panel */
        #main_lngi {
            background-color: #ffccdd;
            font-weight: bold;
            resize: vertical;
            overflow: auto;
            min-height: 60px;
            height: 60px;
            font-size: 150%
        }

        /* Two side panels */
        .mid-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: stretch;
        }

        #BMS_lngi,
        #OCF_lngi {
            flex: 1;
            min-width: 280px;

            resize: vertical;
            overflow: auto;

            min-height: 75px;
            height: 75px;
        }

        #BMS_lngi {
            background-color: #aaaaff;
        }

        #OCF_lngi {
            background-color: #8dff8d;
        }

        #scratch_bars {
            background-color: rgb(220,220,220);
            resize: vertical;
            position: relative;
            height: 155px;
            min-height: 155px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 5px;
        }

        #scratch_bars>div {
            position: relative !important;
            top: auto !important;
            width: 100%;
            min-height: 24px;
            margin-bottom: 4px;
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
        }

        #time_mode {
            position: absolute;
            min-width: 100px;
            right: 0%;
            margin-right: 10px
        }
    </style>
</head>

<body>
    <div>
        <h2>Termiunsfinity's &omega;-Y LNGI <small style="color: #999">With contributions from RNGDelak</small></h2>
        <div id="online">🟢 0 user online (please reload page if the counter stuck at 0)</div>
    </div>

    <div class="top-row">
        <div class="card" id="time">Time elapsed: Loading...</div>
        <div class="card" id="tps">Running at 0 tps</div>
    </div>

    <div class="bar-flexbox">
    <div class="bar-container">
        <div id="main_lngi_bar"></div>
    </div>
    <div id="extra_box"></div>
    </div>

    <div class="card" id="main_lngi">Loading main sequence...</div>

    <div class="mid-row">
        <div class="card" id="BMS_lngi">Loading BMS...</div>
        <div class="card" id="OCF_lngi">Loading OCF...</div>
    </div>

    <div class="card" style="background-color: rgb(220,220,220); resize: vertical; position: relative; height: 30px; min-height: 30px; padding: 5px;">
            Future Milestones:
            <button onclick="tt = (tt+1) % 2" id="time_mode">Time Remaining</button>
    </div>
    <div class="card" id="scratch_bars"></div>
</body>
<script>
        window._nativeSetInterval = window.setInterval;
        window._nativeClearInterval = window.clearInterval;
        window._nativeDateNow = Date.now;
</script>
<script src="proxy.js" type="module"></script>
<script src="ui.js"></script>
<script src="conv.js"></script>
<script src="lngi.js"></script>
</html>
